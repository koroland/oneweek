<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Országos Kéktúra · Aggtelek → Sátoraljaújhely</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --ink:#1b2430; --muted:#5a6675; --line:#e3e7ee; --panel:#ffffff;
    --bg:#eef1f4; --accent:#1d6fb8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",-apple-system,system-ui,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line);z-index:1200}
  header .brand{display:flex;align-items:center;gap:9px}
  header .blz{width:11px;height:11px;border-radius:50%;background:#2178c9;box-shadow:0 0 0 3px rgba(33,120,201,.18)}
  header h1{font-size:16px;font-weight:650;margin:0;letter-spacing:.2px}
  header .route{font-size:13px;color:var(--muted)}
  header .stats{margin-left:auto;display:flex;gap:18px;font-size:12px;color:var(--muted)}
  header .stats b{color:var(--ink);font-weight:650;font-size:14px}
  #main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-width:0}
  aside{width:288px;background:var(--panel);border-left:1px solid var(--line);
    overflow-y:auto;padding:14px 14px 28px}
  aside h2{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);
    margin:4px 0 10px;font-weight:650}
  .day{display:flex;align-items:flex-start;gap:11px;padding:9px 9px;border-radius:9px;
    cursor:pointer;user-select:none;border:1px solid transparent;transition:background .12s,border-color .12s}
  .day:hover{background:#f5f7fa}
  .day.off{opacity:.42}
  .day .bar{width:6px;align-self:stretch;border-radius:4px;flex:none;min-height:34px}
  .day .meta{flex:1;min-width:0}
  .day .ttl{font-size:13.5px;font-weight:650;display:flex;justify-content:space-between;gap:8px}
  .day .ttl .km{font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  .day .leg{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.35}
  .ctl{display:flex;gap:8px;margin:2px 0 14px}
  .ctl button{flex:1;font:inherit;font-size:12.5px;padding:7px;border:1px solid var(--line);
    background:#fff;border-radius:8px;cursor:pointer;color:var(--ink)}
  .ctl button:hover{background:#f5f7fa}
  .ctl button.on{background:#eaf1fb;border-color:#9cc1ec;color:#0a4fd0;font-weight:600}
  .keyrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);margin:7px 2px}
  .keyrow .gw{width:26px;display:flex;justify-content:center;flex:none}
  .kdot{width:13px;height:13px;border-radius:50%;background:#888;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.4)}
  .ksq{width:17px;height:17px;border-radius:5px;background:#444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
  .kflag{font-size:15px}
  .note{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:14px;
    padding-top:12px;border-top:1px solid var(--line)}
  /* leaflet markers */
  .pin-dot{border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45)}
  .pin-bed{border-radius:6px;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
  .pin-flag{display:flex;align-items:center;justify-content:center;font-size:20px;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
  .leaflet-popup-content{margin:10px 13px;font-family:inherit}
  .pp-t{font-size:13.5px;font-weight:700;margin-bottom:2px}
  .pp-s{font-size:12px;color:#5a6675}
  .pp-d{font-size:11.5px;margin-top:4px;font-weight:600}
  @media(max-width:760px){
    #main{flex-direction:column}
    aside{width:auto;border-left:none;border-top:1px solid var(--line);max-height:44%}
    header .stats{width:100%;margin-left:0}
  }
</style>
</head>

  const g=L.layerGroup();

  L.polyline(d.line,{color:d.color,weight:4,opacity:1,lineJoin:'round',lineCap:'round'}).addTo(g);
  dayGroups[d.day]=g; dayState[d.day]=true; g.addTo(map);
  d.line.forEach(p=>allBounds.extend(p));
});

// ---- markers ----
function dotIcon(color){return L.divIcon({className:'',html:`<div class="pin-dot" style="width:13px;height:13px;background:${color}"></div>`,iconSize:[18,18],iconAnchor:[9,9]});}
function bedIcon(color){return L.divIcon({className:'',html:`<div class="pin-bed" style="width:22px;height:22px;background:${color}">⌂</div>`,iconSize:[27,27],iconAnchor:[13,13]});}
function flagIcon(color){return L.divIcon({className:'',html:`<div class="pin-flag" style="color:${color}">⚑</div>`,iconSize:[24,28],iconAnchor:[6,26]});}

DATA.markers.forEach(m=>{
  let icon;
  if(m.t==='overnight') icon=bedIcon(m.color);
  else if(m.t==='start'||m.t==='finish') icon=flagIcon(m.color);
  else icon=dotIcon(m.color);
  const mk=L.marker([m.lat,m.lon],{icon,zIndexOffset:(m.t==='stamp'?0:600)});
  const dlabel = (m.t==='start')?'Rajt · 1. nap':(m.t==='finish')?'Cél · 5. nap':DAYNAME[m.day];
  mk.bindPopup(`<div class="pp-t">${m.label}</div>`+
               (m.sub?`<div class="pp-s">${m.sub}</div>`:'')+
               `<div class="pp-d" style="color:${m.color}">${dlabel}</div>`);
  mk.bindTooltip(m.label,{direction:'top',offset:[0,-10],opacity:.92});
  mk.addTo(dayGroups[m.day]);
});

// ---- sidebar day list ----
const ENDS={1:'Aggtelek → Bódvaszilas',2:'Bódvaszilas → Irota',3:'Irota → Hernádcéce',
            4:'Hernádcéce → Újhuta',5:'Újhuta → Sátoraljaújhely'};
const list=document.getElementById('dayList');
DATA.days.forEach(d=>{
  const row=document.createElement('div');row.className='day';row.dataset.day=d.day;
  row.innerHTML=`<span class="bar" style="background:${d.color}"></span>
    <div class="meta">
      <div class="ttl"><span>${DAYNAME[d.day]}</span><span class="km">${d.dist.toFixed(1).replace('.',',')} km</span></div>
      <div class="leg">${ENDS[d.day]}</div>
    </div>`;
  row.onclick=()=>toggleDay(d.day);
  list.appendChild(row);
});

function refreshRow(day){
  const r=list.querySelector(`[data-day="${day}"]`);
  if(r) r.classList.toggle('off',!dayState[day]);
}
function toggleDay(day){
  dayState[day]=!dayState[day];
  if(dayState[day]) dayGroups[day].addTo(map); else map.removeLayer(dayGroups[day]);
  refreshRow(day);
  // focus the toggled-on day if it's the only one on
  const on=Object.keys(dayState).filter(k=>dayState[k]);
  if(dayState[day] && on.length===1){
    const b=L.latLngBounds([]); DATA.days.find(x=>x.day==day).line.forEach(p=>b.extend(p));
    map.fitBounds(b,{padding:[40,40]});
  }
}
document.getElementById('allOn').onclick=()=>{
  DATA.days.forEach(d=>{dayState[d.day]=true;dayGroups[d.day].addTo(map);refreshRow(d.day);});
  map.fitBounds(allBounds,{padding:[40,40]});
};
document.getElementById('fitAll').onclick=()=>map.fitBounds(allBounds,{padding:[40,40]});
document.getElementById('oktTog').onclick=function(){
  oktOn=!oktOn;
  if(oktOn){oktLayer.addTo(map);oktLayer.bringToBack();this.classList.add('on');}
  else{map.removeLayer(oktLayer);this.classList.remove('on');}
};

// ---- stats ----
const totKm=DATA.days.reduce((s,d)=>s+d.dist,0);
document.getElementById('stKm').textContent=totKm.toFixed(1).replace('.',',');
document.getElementById('stPe').textContent=DATA.markers.filter(m=>m.t==='stamp').length+ DATA.markers.filter(m=>m.t==='overnight').length+1;
document.getElementById('note').textContent='A pontozott kék vonal a hivatalos OKT-nyomvonal: ahol a terv ezen halad, a színes vonal eltakarja, ahol letértek (kilátó, szállás), ott külön látszik. A napi színek a magasságprofiléval egyeznek; egy napra kattintva ki-/bekapcsolod.';

map.fitBounds(allBounds,{padding:[40,40]});
</script>
</body>
</html>
