<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Kéktúra · Aggtelek → Sátoraljaújhely</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f4ef; --card:#ffffff; --ink:#1b2430; --mut:#6f7882; --faint:#9aa3ab;
  --line:#e7e3d9; --line2:#efece4;
  --blue:#1f5fd0; --blue-d:#163f8f;
  --ok:#1f9e6f; --closed:#9aa3ab; --unk:#cf8a16;
  --r:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--paper);
  -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100%;overflow:hidden}
.num{font-family:"Space Grotesk",Inter,sans-serif;font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:14px;padding:11px 16px;background:var(--card);
  border-bottom:1px solid var(--line);flex:0 0 auto;z-index:30}
.blaze{width:26px;height:26px;border-radius:7px;background:#fff;border:1px solid var(--line);
  flex:0 0 auto;position:relative;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.blaze::before{content:"";position:absolute;left:3px;right:3px;top:50%;height:7px;transform:translateY(-50%);
  background:var(--blue);border-radius:2px}
.brand{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.brand .t{font-family:"Space Grotesk";font-weight:700;font-size:15.5px;letter-spacing:-.2px}
.brand .s{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .s b{color:var(--ink);font-weight:600}
.spacer{flex:1}
.tabs{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;flex:0 0 auto}
.tabs button{font:inherit;font-weight:600;font-size:13px;color:var(--mut);background:none;border:0;
  padding:7px 15px;border-radius:8px;cursor:pointer;white-space:nowrap}
.tabs button.on{background:var(--card);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}

/* ---------- day selector (blazes) ---------- */
.daybar{display:flex;gap:7px;padding:9px 16px;background:var(--card);border-bottom:1px solid var(--line);
  flex:0 0 auto;overflow-x:auto;z-index:20;scrollbar-width:none}
.daybar::-webkit-scrollbar{display:none}
.dbtn{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--paper);border-radius:10px;
  padding:6px 12px 7px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:50px;
  color:var(--ink);transition:.12s;flex:0 0 auto}
.dbtn .k{font-family:"Space Grotesk";font-weight:700;font-size:14px;line-height:1}
.dbtn .km{font-size:10px;color:var(--mut)}
.dbtn:hover{border-color:#d8d3c6}
.dbtn.on{color:#fff;border-color:transparent}
.dbtn.on .km{color:rgba(255,255,255,.85)}
.dbtn .stripe{width:18px;height:4px;border-radius:3px;margin-bottom:3px;background:var(--c,var(--blue))}
.dbtn.on{background:var(--c,var(--blue))}
.dbtn.on .stripe{background:rgba(255,255,255,.9)}

/* ---------- main ---------- */
main{flex:1;display:flex;min-height:0;overflow:hidden}
.viewwrap{position:relative;flex:1;min-width:0}
.view{position:absolute;inset:0}
.view.hide{display:none!important}
#map{background:#e9e7e0}
.leaflet-container{font:inherit}
.leaflet-popup-content{margin:9px 12px;font-family:inherit;line-height:1.4}
.leaflet-popup-content b{font-family:"Space Grotesk"}
.ppc{color:var(--mut);font-size:12px}
.chip{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;margin-top:4px}
.chip.open{background:#e3f5ec;color:#137a52}
.chip.closed{background:#eef0f2;color:#737c85}
.chip.unk{background:#fbf0d8;color:#9c6708}

/* ---------- panel ---------- */
.panel{flex:0 0 372px;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;padding:16px 16px 40px}
.phead{display:flex;align-items:baseline;gap:9px}
.pday{font-family:"Space Grotesk";font-weight:700;font-size:21px;letter-spacing:-.4px}
.pdate{font-size:12px;color:var(--mut);font-weight:600}
.pleg{font-size:13.5px;color:var(--ink);font-weight:600;margin-top:1px}
.statrow{display:flex;flex-wrap:wrap;gap:7px;margin:13px 0 4px}
.stat{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:7px 10px;min-width:64px}
.stat .v{font-family:"Space Grotesk";font-weight:700;font-size:15px;line-height:1.1}
.stat .l{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.diffpill{display:inline-block;font-size:11px;font-weight:700;color:#b23a30;background:#fbe7e3;
  padding:3px 9px;border-radius:20px}

h3.sec{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--mut);
  margin:22px 0 9px;font-weight:700;display:flex;align-items:center;gap:7px}
h3.sec::after{content:"";flex:1;height:1px;background:var(--line)}

/* schedule */
.sched{display:flex;flex-direction:column}
.srow{display:grid;grid-template-columns:46px 1fr auto;gap:9px;align-items:center;padding:7px 0;
  border-bottom:1px solid var(--line2)}
.srow:last-child{border-bottom:0}
.stime{font-family:"Space Grotesk";font-weight:700;font-size:13px}
.stime.soft{color:var(--faint);font-weight:600}
.sname{font-size:13.5px;font-weight:600;line-height:1.2}
.sname .skm{display:block;font-size:11px;color:var(--mut);font-weight:500}
.sname.chair{font-weight:600;color:var(--mut);font-style:italic}
.rb{font-family:"Space Grotesk";font-weight:700;font-size:11px;padding:2px 8px;border-radius:20px;
  background:#eef0f2;color:#5c656e;white-space:nowrap}
.rb.lunch{background:#fbf0d8;color:#946408}
.rb.start,.rb.end{background:var(--c);color:#fff}

/* accommodation card */
.acc{border:1px solid var(--line);border-radius:12px;padding:13px;background:linear-gradient(180deg,#fff, #fcfbf7)}
.acc + .acc{margin-top:9px}
.acc .ar{display:flex;align-items:center;gap:9px}
.acc .ahouse{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;
  font-size:15px;flex:0 0 auto;background:var(--c)}
.acc .aname{font-family:"Space Grotesk";font-weight:700;font-size:15px;line-height:1.15}
.acc .arole{font-size:11px;color:var(--mut);font-weight:600}
.acc .acts{display:flex;gap:7px;margin:10px 0 2px;flex-wrap:wrap}
.btnl{font:inherit;font-size:12.5px;font-weight:600;text-decoration:none;padding:6px 11px;border-radius:9px;
  display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);color:var(--ink);background:#fff}
.btnl.tel{background:var(--blue);border-color:var(--blue);color:#fff}
.btnl svg{width:14px;height:14px}
.acc ul{margin:9px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:5px}
.acc li{font-size:12.5px;color:#39424c;padding-left:16px;position:relative;line-height:1.35}
.acc li::before{content:"";position:absolute;left:3px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--c)}

/* resupply */
.poil{display:flex;flex-direction:column;gap:0}
.poir{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line2)}
.poir:last-child{border-bottom:0}
.pico{width:28px;height:28px;border-radius:8px;flex:0 0 auto;display:grid;place-items:center;border:1.5px solid}
.pico svg{width:15px;height:15px}
.pico.open{border-color:var(--ok);color:var(--ok);background:#f1faf5}
.pico.closed{border-color:#d3d8dc;color:var(--closed);background:#f7f8f9}
.pico.unknown{border-color:var(--unk);color:var(--unk);background:#fdf7ea}
.pinfo{flex:1;min-width:0}
.pn{font-size:13.5px;font-weight:600;line-height:1.2}
.pn small{color:var(--mut);font-weight:500}
.ph{font-size:11.5px;color:var(--mut);margin-top:1px}
.pnote{font-size:11px;color:var(--faint);margin-top:1px;font-style:italic}

.infonote{font-size:12.5px;color:#6b5a2e;background:#fbf6e7;border:1px solid #efe3c2;border-radius:10px;
  padding:9px 11px;margin-top:10px;line-height:1.4}
.muted{font-size:12px;color:var(--mut);line-height:1.5}

/* overview list (Mind) */
.ovrow{display:grid;grid-template-columns:auto 1fr auto;gap:11px;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--line2);cursor:pointer}
.ovrow:hover{background:var(--paper);border-radius:8px;padding-left:6px;padding-right:6px}
.ovbar{width:5px;height:34px;border-radius:3px;background:var(--c)}
.ovt .d{font-family:"Space Grotesk";font-weight:700;font-size:13px}
.ovt .leg{font-size:12px;color:var(--mut)}
.ovkm{font-family:"Space Grotesk";font-weight:700;font-size:14px;text-align:right}
.ovkm small{display:block;font-size:10px;color:var(--mut);font-weight:600}

/* legend */
.legend{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.lgr{display:flex;align-items:center;gap:9px;font-size:12.5px;color:#3a434d}
.lgr .gw{width:26px;display:flex;justify-content:center;flex:0 0 auto}

/* ---------- profile ---------- */
#profile{background:var(--paper);display:flex;flex-direction:column}
.profhint{font-size:11.5px;color:var(--mut);padding:8px 14px 0;flex:0 0 auto}
.profwrap{position:relative;flex:1;min-height:0;margin:6px 0 0}
.yaxis{position:absolute;left:0;top:0;bottom:0;width:44px;z-index:5;pointer-events:none;
  background:linear-gradient(90deg,var(--paper) 70%,rgba(246,244,239,0))}
.yaxis span{position:absolute;left:6px;font-family:"Space Grotesk";font-size:10px;color:var(--faint);transform:translateY(-50%)}
.profscroll{position:absolute;inset:0 0 0 0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.profscroll svg{display:block;height:100%}
.pcurve{fill:none;stroke-width:2}
.pfill{opacity:.10}
.gline{stroke:#ddd9cf;stroke-width:1}
.xlab{font-family:"Space Grotesk";font-size:10px;fill:var(--faint)}
.pmk{stroke:#fff;stroke-width:1.6}
.proftip{position:fixed;z-index:50;background:var(--ink);color:#fff;font-size:11.5px;padding:7px 10px;
  border-radius:9px;pointer-events:none;display:none;line-height:1.45;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:200px}
.proftip b{font-family:"Space Grotesk"}
.proftip .tk{color:#cdd6e2}

/* ---------- map markers ---------- */
.mk-stamp{position:relative;width:34px;height:34px}
.mk-stamp .ring{position:absolute;inset:0}
.mk-stamp .num{position:absolute;inset:0;display:grid;place-items:center;font-family:"Space Grotesk";
  font-weight:700;font-size:10.5px;color:var(--c)}
.restbadge{position:absolute;right:-7px;bottom:-5px;font-family:"Space Grotesk";font-weight:700;font-size:9px;
  background:var(--ink);color:#fff;border-radius:20px;padding:1px 5px;border:1.5px solid #fff;line-height:1.3}
.restbadge.lunch{background:#cf8a16}
.mk-chair{position:relative;width:26px;height:26px;border-radius:8px;background:#fff;border:2px solid var(--c);
  display:grid;place-items:center;color:var(--c);box-shadow:0 1px 4px rgba(0,0,0,.15)}
.mk-chair svg{width:15px;height:15px}
.pin-bed{border-radius:8px;display:grid;place-items:center;color:#fff;font-size:15px;
  box-shadow:0 2px 6px rgba(0,0,0,.28);border:2px solid #fff}
.pin-flag{font-size:22px;text-shadow:0 1px 3px rgba(0,0,0,.35);line-height:1}
.mk-poi{width:24px;height:24px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
  background:#fff;border:2px solid var(--c);display:grid;place-items:center;box-shadow:0 2px 5px rgba(0,0,0,.22)}
.mk-poi svg{width:13px;height:13px;transform:rotate(-45deg);color:var(--c)}

/* ---------- mobile ---------- */
@media(max-width:860px){
  body{overflow:auto}
  header{flex-wrap:wrap;gap:10px}
  .brand .s{white-space:normal}
  main{flex-direction:column;overflow:visible}
  .viewwrap{flex:0 0 auto;height:54vh;min-height:340px}
  .panel{flex:0 0 auto;border-left:0;border-top:1px solid var(--line);width:100%}
  .tabs{order:3;width:100%;justify-content:center}
}
@media(max-width:480px){
  .brand .t{font-size:14px}
  header{padding:10px 13px}
  .daybar{padding:8px 13px}
  .panel{padding:14px 13px 36px}
}
</style>
</head>

</main>

DATA.days.forEach(d=>{
  const g=L.layerGroup();
  L.polyline(d.line,{color:d.color,weight:5,opacity:.92,lineJoin:'round',lineCap:'round'}).addTo(g);
  const b=L.latLngBounds(d.line); dayBounds[d.day]=b;
  layers[d.day]=g;
});
// approach dashed lines for accommodations (track end -> exact location)
DATA.markers.forEach(m=>{
  if(m.accom && m.trackend){
    const dist=map.distance([m.lat,m.lon],m.trackend);
    if(dist>40) L.polyline([m.trackend,[m.lat,m.lon]],{color:m.color,weight:2,opacity:.8,dashArray:'3 5'}).addTo(layers[m.day]);
  }
});
// stamp / overnight / start / finish markers
DATA.markers.forEach(m=>{
  let icon,z=0;
  if(m.t==='overnight'){icon=bedIcon(m.color);z=700;}
  else if(m.t==='start'||m.t==='finish'){icon=flagIcon(m.color);z=750;}
  else {icon=stampIcon(m);z=400;}
  const mk=L.marker([m.lat,m.lon],{icon,zIndexOffset:z});
  let pp=`<b>${m.label}</b>`;
  if(m.t==='stamp') pp+=`<br><span class="ppc">${m.sub} · érk. ${m.arr} · +${m.rest}p</span>`;
  else if(m.t==='overnight') pp+=`<br><span class="ppc">${DAYNAME[m.day]} vége · részletek a panelen →</span>`;
  else if(m.t==='start') pp+=`<br><span class="ppc">Rajt · indulás ${m.arr}</span>`;
  else if(m.t==='finish') pp+=`<br><span class="ppc">Cél · érk. ${m.arr}</span>`;
  mk.bindPopup(pp); mk.bindTooltip(m.label,{direction:'top',offset:[0,-14],opacity:.95});
  mk.addTo(layers[m.day]);
});
// chairs
DATA.chairs.forEach(c=>{
  const mk=L.marker([c.lat,c.lon],{icon:chairIcon(c.color),zIndexOffset:380});
  mk.bindPopup(`<b>Falatozó-megálló</b><br><span class="ppc">+${c.rest}p · ${c.note}</span>`);
  mk.bindTooltip("Pihenő +"+c.rest+"p",{direction:'top',offset:[0,-12],opacity:.95});
  mk.addTo(layers[c.day]);
});
// pois
DATA.pois.forEach(p=>{
  const mk=L.marker([p.lat,p.lon],{icon:poiIcon(p),zIndexOffset:120});
  const sc=p.status==='open'?'open':p.status==='closed'?'closed':'unk';
  const st=p.status==='open'?'Nyitva (áthaladáskor)':p.status==='closed'?'Zárva (áthaladáskor)':'Nyitvatartás bizonytalan';
  mk.bindPopup(`<b>${p.name}</b><br><span class="ppc">${p.place} · ${p.hours}</span><br><span class="chip ${sc}">${st}</span>`);
  mk.bindTooltip(p.name+" · "+p.place,{direction:'top',offset:[0,-16],opacity:.95});
  mk.addTo(layers[p.day]);
});

function drawMap(){
  DATA.days.forEach(d=>{ if(state.day===0||state.day===d.day) layers[d.day].addTo(map); else map.removeLayer(layers[d.day]); });
  if(state.day===0) oktLayer.addTo(map); else map.removeLayer(oktLayer);
  if(state.tab==='map'){
    setTimeout(()=>{
      map.invalidateSize();
      const b=state.day===0?L.latLngBounds(DATA.days.flatMap(d=>d.line)):dayBounds[state.day];
      map.fitBounds(b,{padding:[40,40]});
    },10);
  }
}

/* ===================== PROFILE ===================== */
const psc=document.getElementById('profscroll');
const yax=document.getElementById('yaxis');
const tip=document.getElementById('proftip');
let prof={};

function buildProfile(){
  const wrap=psc.parentElement;
  const H=wrap.clientHeight, contW=wrap.clientWidth;
  const padTop=14, padBot=24, GUT=44;
  const ymin=DATA.ymin, ymax=DATA.ymax;
  let x0,x1,days;
  if(state.day===0){x0=0;x1=DATA.xmax;days=DATA.days;}
  else{const d=DATA.days.find(d=>d.day===state.day);x0=d.x0;x1=d.x1;days=[d];}
  const span=x1-x0;
  const pxkm=state.day===0?(isMobile()?12:13):(isMobile()?34:26);
  const Wplot=Math.max(contW, span*pxkm);
  const plotH=H-padTop-padBot;
  const X=km=>GUT+(km-x0)/span*(Wplot-GUT-8);
  const Y=e=>padTop+(1-(e-ymin)/(ymax-ymin))*plotH;
  prof={x0,x1,span,Wplot,GUT,Y,X,ymin,ymax,padTop,plotH,days};

  let s=`<svg width="${Wplot}" viewBox="0 0 ${Wplot} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`;
  // gridlines
  yax.innerHTML="";
  for(let e=Math.ceil(ymin/100)*100;e<=ymax;e+=100){
    const y=Y(e);
    s+=`<line class="gline" x1="${GUT}" y1="${y.toFixed(1)}" x2="${Wplot}" y2="${y.toFixed(1)}"/>`;
    const sp=document.createElement('span'); sp.textContent=e; sp.style.top=y+"px"; yax.appendChild(sp);
  }
  // x ticks
  const step=state.day===0?10:(span>14?5:2);
  for(let k=Math.ceil(x0/step)*step;k<=x1+0.01;k+=step){
    const x=X(k);
    s+=`<text class="xlab" x="${x.toFixed(1)}" y="${H-7}" text-anchor="middle">${Math.round(k)}</text>`;
  }
  // area + curve per day
  days.forEach(d=>{
    const pts=d.seg;
    let dd="M"+X(pts[0][0]).toFixed(1)+","+Y(pts[0][1]).toFixed(1);
    for(let i=1;i<pts.length;i++) dd+="L"+X(pts[i][0]).toFixed(1)+","+Y(pts[i][1]).toFixed(1);
    const base=padTop+plotH;
    s+=`<path class="pfill" d="${dd}L${X(pts[pts.length-1][0]).toFixed(1)},${base}L${X(pts[0][0]).toFixed(1)},${base}Z" fill="${d.color}"/>`;
    s+=`<path class="pcurve" d="${dd}" stroke="${d.color}"/>`;
  });
  // markers
  const inrange=k=>k>=x0-0.05&&k<=x1+0.05;
  DATA.markers.forEach(m=>{
    if(!inrange(m.km)) return;
    if(state.day!==0 && m.day!==state.day && m.t!=='overnight' && m.t!=='start' && m.t!=='finish' && !(m.km>=x0&&m.km<=x1)) return;
    const x=X(m.km),y=Y(m.ele);
    if(m.t==='overnight') s+=`<rect class="pmk" x="${(x-5).toFixed(1)}" y="${(y-5).toFixed(1)}" width="10" height="10" transform="rotate(45 ${x.toFixed(1)} ${y.toFixed(1)})" fill="${m.color}"/>`;
    else if(m.t==='start'||m.t==='finish') s+=`<path class="pmk" d="M${x.toFixed(1)},${(y-6).toFixed(1)} L${(x+5.5).toFixed(1)},${(y+4).toFixed(1)} L${(x-5.5).toFixed(1)},${(y+4).toFixed(1)} Z" fill="${m.color}"/>`;
    else s+=`<circle class="pmk" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.4" fill="${m.color}"/>`;
  });
  s+=`</svg>`;
  psc.innerHTML=s;
  psc.scrollLeft=0;
  prof.svg=psc.querySelector('svg');
}

function profMove(ev){
  if(!prof.svg) return;
  const r=prof.svg.getBoundingClientRect();
  const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
  const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
  const px=cx-r.left;
  const km=prof.x0+(px-prof.GUT)/(prof.Wplot-prof.GUT-8)*prof.span;
  if(km<prof.x0||km>prof.x1){tip.style.display='none';return;}
  // nearest profile point
  let best=null,bd=1e9;
  prof.days.forEach(d=>d.seg.forEach(p=>{const dk=Math.abs(p[0]-km);if(dk<bd){bd=dk;best=p;}}));
  // nearest marker within 0.5 km
  let nm=null,nmd=0.5;
  DATA.markers.forEach(m=>{if(m.km>=prof.x0&&m.km<=prof.x1){const dk=Math.abs(m.km-km);if(dk<nmd){nmd=dk;nm=m;}}});
  let html=`<b>${best?Math.round(best[1]):"?"} m</b> <span class="tk">· ${fmtkm(km)} km</span>`;
  if(nm){html=`<b>${nm.label}</b><br><span class="tk">${nm.t==='stamp'?nm.sub+' · ':''}${Math.round(nm.ele)} m · ${fmtkm(nm.km)} km</span>`;
    if(nm.t==='stamp')html+=`<br><span class="tk">érk. ${nm.arr} · pihenő +${nm.rest}p</span>`;
    else if(nm.t==='start')html+=`<br><span class="tk">indulás ${nm.arr}</span>`;
    else if(nm.t==='finish'||nm.t==='overnight')html+=`<br><span class="tk">érk. ${nm.arr}</span>`;}
  tip.innerHTML=html; tip.style.display='block';
  let tx=cx+12,ty=cy-10;
  if(tx+210>window.innerWidth)tx=cx-210;
  tip.style.left=tx+"px"; tip.style.top=ty+"px";
}
psc.addEventListener('mousemove',profMove);
psc.addEventListener('mouseleave',()=>tip.style.display='none');
psc.addEventListener('touchstart',profMove,{passive:true});
psc.addEventListener('touchmove',profMove,{passive:true});

/* ===================== PANEL ===================== */
const panel=document.getElementById('panel');
const mapsUrl=(la,lo)=>`https://www.google.com/maps/search/?api=1&query=${la},${lo}`;
const telHref=ph=>"tel:"+ph.replace(/[^+0-9]/g,"");
const accomByIdx=i=>DATA.accom.find(a=>a.idx===i);

function accCard(a,c){
  const role=a.role==='rajt'?'Indulás · esti szállás (aug. 16.)':a.role==='cél'?'Cél · utolsó éjszaka':'Esti szállás';
  let acts="";
  if(a.phone) acts+=`<a class="btnl tel" href="${telHref(a.phone)}">${G.phone}${a.phone}${a.phone_who?" ("+a.phone_who+")":""}</a>`;
  acts+=`<a class="btnl" target="_blank" rel="noopener" href="${mapsUrl(a.lat,a.lon)}">${G.pin}Térképen</a>`;
  const notes=(a.notes||[]).map(n=>`<li>${n}</li>`).join("");
  return `<div class="acc" style="--c:${c}">
    <div class="ar"><div class="ahouse">⌂</div><div><div class="aname">${a.short}</div><div class="arole">${role}</div></div></div>
    <div class="acts">${acts}</div>
    ${notes?`<ul>${notes}</ul>`:""}
  </div>`;
}

function renderPanel(){
  if(state.day===0){ renderOverview(); return; }
  const d=DATA.days.find(d=>d.day===state.day), c=d.color;
  const acc=accomByIdx(d.accom_idx);
  // schedule entries
  let ent=[];
  const start=DATA.markers[0];
  if(d.day===1) ent.push({time:d.start,km:0,name:"Baradla Kemping – rajt",cls:"start"});
  DATA.markers.forEach(m=>{ if(m.day===d.day && m.t==='stamp') ent.push({time:m.arr,km:m.km-d.x0,name:m.label,sub:m.sub,rest:m.rest,rkind:m.rkind}); });
  DATA.chairs.filter(ch=>ch.day===d.day).forEach(ch=>ent.push({time:"",km:ch.km,name:"Falatozó-megálló",rest:ch.rest,chair:true}));
  // overnight / finish end
  const endm=DATA.markers[d.accom_idx];
  ent.push({time:"18:00",km:endm.km-d.x0,name:(d.day===5?"Rákóczi Hotel – cél":acc.short),cls:"end"});
  if(d.day===1){ // start km adjust: day1 start km 0 already
  }
  ent.sort((a,b)=>a.km-b.km);
  let sched=ent.map(e=>{
    let rb="";
    if(e.cls==='start') rb=`<span class="rb start" style="--c:${c}">indulás</span>`;
    else if(e.cls==='end') rb=`<span class="rb end" style="--c:${c}">érkezés</span>`;
    else if(e.rest) rb=`<span class="rb ${e.rkind==='ebéd'?'lunch':''}">+${e.rest}p${e.rkind==='ebéd'?' ebéd':e.rkind==='kilátó'?' kilátó':''}</span>`;
    return `<div class="srow">
      <div class="stime${e.time?'':' soft'}">${e.time||'≈'}</div>
      <div class="sname${e.chair?' chair':''}">${e.name}<span class="skm">${fmtkm(Math.max(0,e.km))} km</span></div>
      <div>${rb}</div></div>`;
  }).join("");

  // resupply
  const pois=DATA.pois.filter(p=>p.day===d.day);
  let res=pois.map(p=>{
    return `<div class="poir">
      <div class="pico ${p.status}">${G[p.kind]}</div>
      <div class="pinfo"><div class="pn">${p.name} <small>· ${p.place}</small></div>
      <div class="ph">${p.hours}</div>${p.note?`<div class="pnote">${p.note}</div>`:""}</div></div>`;
  }).join("");
  if(!res) res=`<div class="muted">Nincs feltérképezett bolt ezen a napon.</div>`;

  let extra="";
  if(d.day===1) extra=accCard(accomByIdx(0),c); // Baradla rajt info on day 1

  panel.innerHTML=`
    <div class="phead"><span class="pday" style="color:${c}">${d.day}. nap</span><span class="pdate">${d.date}</span></div>
    <div class="pleg">${d.ends}</div>
    <div class="statrow">
      <div class="stat"><div class="v">${fmtkm(d.dist)}</div><div class="l">km</div></div>
      <div class="stat"><div class="v">+${d.gainp}<span style="color:var(--mut);font-size:11px"> / −${d.gainm}</span></div><div class="l">szint (m)</div></div>
      <div class="stat"><div class="v">${d.moving}</div><div class="l">menetidő</div></div>
      <div class="stat"><div class="v">${d.start}→18</div><div class="l">időablak</div></div>
    </div>
    <div><span class="diffpill">${d.diff}</span></div>

    <h3 class="sec">Menetrend &amp; pihenők</h3>
    <div class="sched">${sched}</div>

    <h3 class="sec">Szállás</h3>
    ${accCard(acc,c)}
    ${extra}

    <h3 class="sec">Ellátás útközben</h3>
    <div class="poil">${res}</div>
    ${d.info?`<div class="infonote">${d.info}</div>`:""}
  `;
  panel.scrollTop=0;
}

function renderOverview(){
  const ov=DATA.days.map(d=>`
    <div class="ovrow" data-day="${d.day}">
      <div class="ovbar" style="--c:${d.color}"></div>
      <div class="ovt"><div class="d" style="color:${d.color}">${d.day}. nap · ${d.date}</div>
        <div class="leg">${d.ends}</div></div>
      <div class="ovkm">${fmtkm(d.dist)}<small>km · ${d.moving}</small></div>
    </div>`).join("");
  panel.innerHTML=`
    <div class="phead"><span class="pday" style="color:var(--blue)">Áttekintés</span></div>
    <div class="pleg">Aggtelek → Sátoraljaújhely · 5 nap</div>
    <div class="statrow">
      <div class="stat"><div class="v">158,9</div><div class="l">km</div></div>
      <div class="stat"><div class="v">+3 561</div><div class="l">emelkedés (m)</div></div>
      <div class="stat"><div class="v">43:40</div><div class="l">menetidő</div></div>
      <div class="stat"><div class="v">5</div><div class="l">nap · nehéz</div></div>
    </div>
    <h3 class="sec">Napok</h3>
    ${ov}
    <h3 class="sec">Jelmagyarázat</h3>
    <div class="legend">
      <div class="lgr"><span class="gw"><svg width="20" height="20" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="#fff" stroke="#1f5fd0" stroke-width="2" stroke-dasharray="1.5 2.15"/><circle cx="17" cy="17" r="10" fill="none" stroke="#1f5fd0" stroke-width="1.1"/></svg></span>Pecsételőhely (OKTPH) · a jelvény a pihenő hossza</div>
      <div class="lgr"><span class="gw"><span class="mk-chair" style="--c:#444;width:20px;height:20px;border-width:2px">${G.chair}</span></span>Pihenő-megálló (hosszú szakaszokon)</div>
      <div class="lgr"><span class="gw"><span class="pin-bed" style="width:18px;height:18px;background:#444;font-size:12px">⌂</span></span>Szállás / napvég</div>
      <div class="lgr"><span class="gw"><span style="font-size:16px">⚑</span></span>Rajt / cél</div>
      <div class="lgr"><span class="gw"><span class="pico open" style="width:20px;height:20px;border-width:1.5px">${G.shop}</span></span>Bolt · zöld=nyitva, szürke=zárva, sárga=bizonytalan (áthaladáskor)</div>
      <div class="lgr"><span class="gw"><span class="pico open" style="width:20px;height:20px;border-width:1.5px">${G.pharm}</span></span>Gyógyszertár</div>
      <div class="lgr"><span class="gw"><span class="pico open" style="width:20px;height:20px;border-width:1.5px">${G.food}</span></span>Kocsma / étterem / büfé</div>
    </div>
    <div class="muted" style="margin-top:14px">A pontozott kék vonal a hivatalos OKT-nyomvonal (csak az áttekintő nézetben látszik) — a színes sávtól való eltérés a szállásra való rátérést / szándékos kitérőt mutatja. A nyitvatartások a Google adatai a túra tényleges hétköznapjaira vetítve — helyszínen érdemes ellenőrizni, a vidéki boltoknál gyakran pontatlan. A menetidő a Természetjáró becslése; a pihenők 18:00-s beérésre vannak igazítva.</div>
  `;
  panel.querySelectorAll('.ovrow').forEach(r=>r.onclick=()=>selectDay(+r.dataset.day));
}

/* ===================== day selector ===================== */
const daybar=document.getElementById('daybar');
function buildDaybar(){
  let h=`<button class="dbtn" data-day="0"><span class="stripe" style="--c:var(--blue)"></span><span class="k">Mind</span><span class="km">159 km</span></button>`;
  DATA.days.forEach(d=>{ h+=`<button class="dbtn" data-day="${d.day}" style="--c:${d.color}"><span class="stripe"></span><span class="k">${d.day}. nap</span><span class="km">${fmtkm(d.dist)} km</span></button>`; });
  daybar.innerHTML=h;
  daybar.querySelectorAll('.dbtn').forEach(b=>b.onclick=()=>selectDay(+b.dataset.day));
}
function syncDaybar(){daybar.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('on',+b.dataset.day===state.day));}

function selectDay(day){ state.day=day; syncDaybar(); drawMap(); if(state.tab==='prof') buildProfile(); renderPanel(); }

/* ===================== tabs ===================== */
const tabMap=document.getElementById('tabMap'),tabProf=document.getElementById('tabProf');
const elMap=document.getElementById('map'),elProf=document.getElementById('profile');
function setTab(t){
  state.tab=t;
  tabMap.classList.toggle('on',t==='map'); tabProf.classList.toggle('on',t==='prof');
  elMap.classList.toggle('hide',t!=='map'); elProf.classList.toggle('hide',t!=='prof');
  tip.style.display='none';
  if(t==='map'){drawMap();} else {buildProfile();}
}
tabMap.onclick=()=>setTab('map'); tabProf.onclick=()=>setTab('prof');

let rt; window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(state.tab==='prof')buildProfile();else map.invalidateSize();},180);});

/* ===================== init ===================== */
buildDaybar(); syncDaybar(); drawMap(); renderPanel();
</script>
