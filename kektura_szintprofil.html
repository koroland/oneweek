<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Országos Kéktúra · szintprofil</title>
<style>
  :root{--ink:#1b2430;--muted:#5a6675;--line:#e3e7ee;--panel:#fff;--bg:#eef1f4;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",-apple-system,system-ui,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  #app{position:fixed;inset:0;display:flex;flex-direction:column}
  header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;padding:12px 18px;background:var(--panel);border-bottom:1px solid var(--line)}
  header .brand{display:flex;align-items:center;gap:9px}
  header .blz{width:11px;height:11px;border-radius:50%;background:#2178c9;box-shadow:0 0 0 3px rgba(33,120,201,.18)}
  header h1{font-size:16px;font-weight:650;margin:0}
  header .route{font-size:13px;color:var(--muted)}
  header .stats{margin-left:auto;display:flex;gap:18px;font-size:12px;color:var(--muted)}
  header .stats b{color:var(--ink);font-weight:650;font-size:14px}
  #main{flex:1;display:flex;min-height:0}
  #chartWrap{flex:1;min-width:0;position:relative;padding:8px 8px 4px}
  svg{width:100%;height:100%;display:block}
  aside{width:288px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:14px 14px 28px}
  aside h2{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:4px 0 10px;font-weight:650}
  .ctl{display:flex;gap:8px;margin:2px 0 14px}
  .ctl button{flex:1;font:inherit;font-size:12.5px;padding:7px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;color:var(--ink)}
  .ctl button:hover{background:#f5f7fa}
  .day{display:flex;align-items:flex-start;gap:11px;padding:9px;border-radius:9px;cursor:pointer;user-select:none;border:1px solid transparent;transition:background .12s}
  .day:hover{background:#f5f7fa}
  .day.off{opacity:.42}
  .day .bar{width:6px;align-self:stretch;border-radius:4px;flex:none;min-height:34px}
  .day .meta{flex:1;min-width:0}
  .day .ttl{font-size:13.5px;font-weight:650;display:flex;justify-content:space-between;gap:8px}
  .day .ttl .km{font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  .day .leg{font-size:12px;color:var(--muted);margin-top:2px}
  .keyrow{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);margin:7px 2px}
  .keyrow .gw{width:26px;display:flex;justify-content:center;flex:none}
  .kdot{width:13px;height:13px;border-radius:50%;background:#888;border:2px solid #fff;box-shadow:0 0 2px rgba(0,0,0,.4)}
  .ksq{width:17px;height:17px;border-radius:5px;background:#444;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
  .kflag{font-size:15px}
  .note{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  #tip{position:absolute;pointer-events:none;background:#fff;border:1px solid var(--line);border-radius:8px;
    box-shadow:0 4px 14px rgba(20,30,45,.16);padding:7px 10px;font-size:12px;opacity:0;transition:opacity .08s;z-index:5;max-width:230px}
  #tip .t{font-weight:700;font-size:13px;margin-bottom:1px}
  #tip .s{color:var(--muted);font-size:11.5px}
  #tip .d{font-weight:600;font-size:11.5px;margin-top:3px}
  .mk{cursor:pointer}
  @media(max-width:760px){#main{flex-direction:column}aside{width:auto;border-left:none;border-top:1px solid var(--line);max-height:46%}header .stats{width:100%;margin-left:0}}
</style>
</head>

  });
  // hover cursor
  const cur=`<g id="cur" style="display:none"><line id="curl" y1="${py0}" y2="${py1}" stroke="#7a8694" stroke-width="1" stroke-dasharray="3 3"/><circle id="curc" r="4.5" fill="#fff" stroke="#1b2430" stroke-width="2"/></g>`;
  svg.innerHTML=defs+grid+areas+bnd+mks+cur;
}
build();

// flatten profile for nearest lookup
let flat=[];
DATA.days.forEach(d=>d.seg.forEach(p=>flat.push({km:p[0],ele:p[1],day:d.day})));
flat.sort((a,b)=>a.km-b.km);

const tip=document.getElementById('tip'), wrap=document.getElementById('chartWrap');
const cur=()=>document.getElementById('cur');
function toScreen(vx,vy){const p=svg.createSVGPoint();p.x=vx;p.y=vy;const s=p.matrixTransform(svg.getScreenCTM());const r=wrap.getBoundingClientRect();return {x:s.x-r.left,y:s.y-r.top};}

let overMarker=false;
svg.addEventListener('mousemove',ev=>{
  if(overMarker) return;
  const p=svg.createSVGPoint();p.x=ev.clientX;p.y=ev.clientY;
  const vb=p.matrixTransform(svg.getScreenCTM().inverse());
  let km=(vb.x-px0)/(px1-px0)*XMAX;
  if(km<0||km>XMAX){hideCur();return;}
  // nearest visible point
  let best=null,bd=1e9;
  for(const f of flat){if(!visible.has(f.day))continue;const dd=Math.abs(f.km-km);if(dd<bd){bd=dd;best=f;}}
  if(!best){hideCur();return;}
  const c=cur();c.style.display='';
  document.getElementById('curl').setAttribute('x1',X(best.km));
  document.getElementById('curl').setAttribute('x2',X(best.km));
  document.getElementById('curc').setAttribute('cx',X(best.km));
  document.getElementById('curc').setAttribute('cy',Y(best.ele));
  const sc=toScreen(X(best.km),Y(best.ele));
  tip.innerHTML=`<div class="t">${best.km.toFixed(1).replace('.',',')} km</div><div class="s">${Math.round(best.ele)} m tszf.</div><div class="d" style="color:${DATA.days[best.day-1].color}">${DAYNAME[best.day]}</div>`;
  placeTip(sc.x,sc.y);
});
svg.addEventListener('mouseleave',()=>{hideCur();tip.style.opacity=0;});
function hideCur(){const c=cur();if(c)c.style.display='none';tip.style.opacity=0;}
function placeTip(x,y){
  tip.style.opacity=1;const tw=tip.offsetWidth,th=tip.offsetHeight;
  let tx=x+14, ty=y-th-10;
  if(tx+tw>wrap.clientWidth-6) tx=x-tw-14;
  if(ty<4) ty=y+14;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}

// marker hover
svg.querySelectorAll('.mk').forEach(g=>{
  g.addEventListener('mouseenter',()=>{
    overMarker=true;hideCur();
    const m=DATA.markers[+g.dataset.i];
    if(!visible.has(m.day))return;
    tip.innerHTML=`<div class="t">${m.label}</div>`+(m.sub?`<div class="s">${m.sub}</div>`:'')+
      `<div class="d" style="color:${m.color}">${m.km.toFixed(1).replace('.',',')} km · ${m.ele} m</div>`;
    const sc=toScreen(X(m.km),Y(m.ele));placeTip(sc.x,sc.y);
  });
  g.addEventListener('mouseleave',()=>{overMarker=false;tip.style.opacity=0;});
});

// sidebar
const list=document.getElementById('dayList');
DATA.days.forEach(d=>{
  const row=document.createElement('div');row.className='day';row.dataset.day=d.day;
  row.innerHTML=`<span class="bar" style="background:${d.color}"></span><div class="meta">
    <div class="ttl"><span>${DAYNAME[d.day]}</span><span class="km">${d.dist.toFixed(1).replace('.',',')} km</span></div>
    <div class="leg">${ENDS[d.day]}</div></div>`;
  row.onclick=()=>toggle(d.day);
  list.appendChild(row);
});
function setDayVis(day,on){
  svg.querySelectorAll(`.dg[data-day="${day}"],.mk[data-day="${day}"],.dlab[data-day="${day}"],.dlab2[data-day="${day}"]`)
     .forEach(el=>el.style.opacity=on?'':'0.12');
  svg.querySelectorAll(`.mk[data-day="${day}"]`).forEach(el=>el.style.display=on?'':'none');
  list.querySelector(`[data-day="${day}"]`).classList.toggle('off',!on);
}
function toggle(day){
  if(visible.has(day)){visible.delete(day);setDayVis(day,false);}
  else{visible.add(day);setDayVis(day,true);}
}
document.getElementById('allOn').onclick=()=>DATA.days.forEach(d=>{if(!visible.has(d.day))toggle(d.day);});

// stats + note
document.getElementById('stKm').textContent=DATA.stats.dist.toFixed(1).replace('.',',');
document.getElementById('stG').textContent='+3 561 m';
document.getElementById('note').textContent='Oldalnézeti magasságprofil; a vízszintes tengely a megtett táv, a függőleges a tengerszint feletti magasság. A napi színek a térképpel egyeznek. Az emelkedés a Természetjáró simított referenciája (+3 561 m); a nyers GPX-összeg zajosabb (~+4 700 m). Vidd a kurzort a görbére vagy egy pontra a részletekért.';
</script>
</body>
